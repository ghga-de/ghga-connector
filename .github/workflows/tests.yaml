name: Tests

on: push

jobs:
  tests:
    name: Tests

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9']
        os: [windows-latest]

    steps:
      - name: Checkout repository
        id: checkout
        uses: actions/checkout@v4

      - name: Common steps
        id: common
        uses: ghga-de/gh-action-common@v6.0.1
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install docker and colima and start (macOS)
        id: macos-setup
        if: runner.os == 'macOS'
        run: |
              brew install docker
              brew install colima
              colima start
              sudo ln -sf $HOME/.colima/default/docker.sock /var/run/docker.sock

      - name: Install missing package (Windows)
        id: windows-setup
        if: runner.os == 'Windows'
        run: |
          pip install --disable-pip-version-check pywin32 pypiwin32

      - name: Install tox plugin
        id: install-tox-gh-actions
        run: |
          pip install --disable-pip-version-check "tox-gh-actions>=3.2,<4"

      - name: Run tests on Windows with Python ${{ matrix.python-version }}
        id: pytest-windows
        if: ${{ runner.os == 'Windows' }}
        run: |
          set ${{ steps.common.outputs.CONFIG_YAML_ENV_VAR_NAME }}="${{ steps.common.outputs.CONFIG_YAML }}"

          tox

      - name: Run tests with Python ${{ matrix.python-version }}
        id: pytest
        if: ${{ matrix.python-version != '3.12' && runner.os == 'Linux' || runner.os == 'macOS' }}
        run: |
          export ${{ steps.common.outputs.CONFIG_YAML_ENV_VAR_NAME }}=${{ steps.common.outputs.CONFIG_YAML }}"

          tox

      - name: Run tests with Python ${{ matrix.python-version }} measuring coverage
        id: pytest-coverage
        if: ${{ matrix.python-version == '3.12' && runner.os == 'Linux' }}
        run: |
          export ${{ steps.common.outputs.CONFIG_YAML_ENV_VAR_NAME }}="${{ steps.common.outputs.CONFIG_YAML }}"

          tox -- --cov="${{ steps.common.outputs.PACKAGE_NAME }}" --cov-report=xml


      - name: Upload coverage to coveralls
        id: coveralls
        if: ${{ matrix.python-version == '3.12' && runner.os == 'Linux' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install --upgrade coveralls
          coveralls --service=github
